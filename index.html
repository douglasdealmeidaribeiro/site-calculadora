<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Financiamento Price</title>
    <link rel="stylesheet" href="./public/style.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <div class="hero-text">
          <p class="eyebrow">Financiamento Price</p>
          <h1>Calcule sua parcela com clareza</h1>
          <p>Informe o valor financiado, o prazo e a taxa de juros para ver a amortização mês a mês.</p>
        </div>
      </section>

      <section class="card">
        <form id="form-financiamento">
          <div class="field-group">
            <label for="valorFinanciado">Valor financiado (R$)</label>
            <input id="valorFinanciado" name="valorFinanciado" type="number" min="0" step="0.01" placeholder="Ex.: 10000" required />
          </div>

          <div class="field-group">
            <label for="numeroMeses">Número de meses</label>
            <input id="numeroMeses" name="numeroMeses" type="number" min="1" step="1" placeholder="Ex.: 24" required />
          </div>

          <div class="field-group">
            <label for="taxaJuros">Taxa de juros mensal (%)</label>
            <input id="taxaJuros" name="taxaJuros" type="number" min="0" step="0.01" placeholder="Ex.: 1.5" required />
          </div>

          <div class="actions">
            <button type="submit">Calcular parcela</button>
            <button type="button" id="btn-limpar" class="btn-limpar">Limpar</button>
          </div>
        </form>

        <div id="resultado" class="resultado" aria-live="polite">
          Preencha os dados para ver o resultado.
        </div>
      </section>
    </main>

    <script src="./public/app.js"></script>
  </body>
</html>
